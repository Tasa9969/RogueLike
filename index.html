<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2Dローグライクアクション</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      background: #181818;
    }
    #help {
      position: fixed;
      left: 12px;
      bottom: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-line;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="help">移動: 矢印キー / WASD
剣: J
弓: K
毒消しキノコ: L
再開/リスタート: R</div>
<script>
(() => {
  const VERSION = '0.1.1';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const keys = new Set();
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    keys.add(k);
    if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase())) e.preventDefault();
    if (['j','k','l','r'].includes(k)) e.preventDefault();
    if ((state.gameOver || state.floorClearMessageTimer > 0) && k === 'r') restartGame();
  });
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

  const rand = (a, b) => Math.random() * (b - a) + a;
  const randi = (a, b) => Math.floor(rand(a, b + 1));
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
  const lerp = (a, b, t) => a + (b - a) * t;

  function normalize(x, y) {
    const d = Math.hypot(x, y);
    if (d === 0) return { x: 0, y: 0 };
    return { x: x / d, y: y / d };
  }

  function angleDiff(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return Math.abs(d);
  }

  const SHAPES = ['circle', 'square', 'triangle', 'diamond'];
  const SWORD_DATA = {
    wood:   { name: '木剣', color: '#c9a26b', damage: 1, durability: Infinity },
    copper: { name: '銅剣', color: '#9c5e38', damage: 2, durability: 40 },
    iron:   { name: '鉄剣', color: '#7b8a95', damage: 3, durability: 52 },
    silver: { name: '銀剣', color: '#cfd6dc', damage: 4, durability: 70 },
    flame:  { name: '炎剣', color: '#e84a2f', damage: 6, durability: 84 },
    lizard: { name: 'リザード剣', color: '#84cc5b', damage: 7, durability: 98 },
    gold:   { name: '金剣', color: '#f3c547', damage: 8, durability: 120 },
  };
  const BOW_DATA = {
    copper: { name: '銅の弓', color: '#b8794d', damage: 1, arrows: 8 },
    silver: { name: '銀の弓', color: '#d8d8df', damage: 2, arrows: 14 },
    gold:   { name: '金の弓', color: '#f0cf52', damage: 4, arrows: 24 },
  };

  const state = {
    gameOver: false,
    floor: 1,
    floorClearMessageTimer: 0,
    camera: { x: 0, y: 0 },
    damageFlash: 0,
    map: null,
    player: null,
    enemies: [],
    projectiles: [],
    effects: [],
    items: [],
    nests: [],
    turrets: [],
    boss: null,
    stairs: null,
    lastTime: 0,
  };

  function createPlayer() {
    const shape = SHAPES[randi(0, SHAPES.length - 1)];
    return {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      angle: -Math.PI / 2,
      shape,
      radius: 13,
      level: 1,
      exp: 0,
      expToNext: 12,
      maxHp: 24,
      hp: 24,
      atk: 4,
      def: 1,
      weight: 2,
      speed: 170,
      accel: 620,
      frontAtkBonus: 1,
      frontDefBonus: 1,
      contactDamage: 4,
      gold: 0,
      hasKey: false,
      poisoned: 0,
      antidoteMushrooms: 1,
      naturalRegen: 1,
      naturalRegenInterval: 1.2,
      regenCooldownAfterHit: 2,
      regenBlock: 0,
      regenTimer: 0,
      sword: { tier: 'wood', durability: Infinity },
      bow: null,
      arrowCount: 0,
      swordAnim: null,
      swordHitMap: new Set(),
      lastTouchDamageTick: 0,
      lastBowShot: 0,
      lastHitFlash: 0,
    };
  }

  function createEnemy(type, x, y, floor, boss = false) {
    const depthScale = 1 + (floor - 1) * 0.22;
    const aiTypes = ['chase', 'ambush', 'wander', 'flee'];
    const ai = aiTypes[randi(0, aiTypes.length - 1)];
    const base = {
      melee:        { color: '#d95f5f', hp: 8, atk: 3, def: 0, speed: 110, accel: 280, r: 12, gold: 6, shape: 'circle' },
      tank:         { color: '#7f8c8d', hp: 18, atk: 3, def: 3, speed: 72, accel: 160, r: 16, gold: 12, shape: 'square' },
      poison:       { color: '#81c784', hp: 10, atk: 3, def: 1, speed: 100, accel: 230, r: 12, gold: 9, shape: 'diamond', poison: true },
      charger:      { color: '#ffd166', hp: 9, atk: 5, def: 0, speed: 150, accel: 420, r: 11, gold: 10, shape: 'triangle' },
      shooter:      { color: '#64b5f6', hp: 8, atk: 3, def: 0, speed: 85, accel: 180, r: 11, gold: 9, shape: 'diamond', ranged: true },
      boss:         { color: '#ff77aa', hp: 34, atk: 6, def: 3, speed: 95, accel: 220, r: 26, gold: 40, shape: 'circle', poison: Math.random() < 0.35, ranged: Math.random() < 0.6 },
    }[boss ? 'boss' : type];
    return {
      x, y,
      vx: 0, vy: 0,
      angle: 0,
      type,
      ai,
      color: base.color,
      shape: base.shape,
      radius: base.r + (boss ? 0 : randi(-1, 2)),
      maxHp: Math.round(base.hp * depthScale),
      hp: Math.round(base.hp * depthScale),
      atk: Math.round(base.atk * (1 + (floor - 1) * 0.18)),
      def: Math.round(base.def * (1 + (floor - 1) * 0.10)),
      weight: boss ? 8 : (type === 'tank' ? 6 : 2),
      speed: base.speed * (1 + (floor - 1) * 0.06),
      accel: base.accel * (1 + (floor - 1) * 0.06),
      goldValue: Math.round(base.gold * depthScale),
      poison: !!base.poison,
      ranged: !!base.ranged,
      showHpTimer: 0,
      dead: false,
      touchTick: 0,
      shootCd: rand(1.0, 2.3),
      isBoss: boss,
    };
  }

  function createProjectile(x, y, vx, vy, damage, owner, color, poison = false, radius = 4) {
    return { x, y, vx, vy, damage, owner, color, poison, radius, dead: false, life: 4.0 };
  }

  function makeDepthPalette(floor) {
    const band = Math.floor((floor - 1) / 5);
    const palettes = [
      { wall: '#3a3a3a', floor: '#6a6a6a', accent: '#8d8d8d' },
      { wall: '#39485a', floor: '#667b8a', accent: '#91a9b7' },
      { wall: '#3f315d', floor: '#64528d', accent: '#9174b3' },
      { wall: '#522d4d', floor: '#7a496c', accent: '#a05f86' },
      { wall: '#2e3f1f', floor: '#5d7446', accent: '#9db35e' },
      { wall: '#522c1b', floor: '#8c5d34', accent: '#d0964d' },
    ];
    return palettes[band % palettes.length];
  }

  function generateDungeon(floor) {
    const cols = 72;
    const rows = 72;
    const tile = 32;
    const map = Array.from({ length: rows }, () => Array(cols).fill(1));
    const rooms = [];
    const roomCount = randi(10, 15);

    function carveRoom(x, y, w, h) {
      for (let yy = y; yy < y + h; yy++) {
        for (let xx = x; xx < x + w; xx++) {
          if (yy > 1 && yy < rows - 1 && xx > 1 && xx < cols - 1) map[yy][xx] = 0;
        }
      }
      rooms.push({ x, y, w, h, cx: x + Math.floor(w / 2), cy: y + Math.floor(h / 2) });
    }

    function carveCorridor(ax, ay, bx, by) {
      let x = ax, y = ay;
      while (x !== bx || y !== by) {
        map[y][x] = 0;
        if (Math.random() < 0.55) {
          if (x < bx) x++; else if (x > bx) x--;
        } else {
          if (y < by) y++; else if (y > by) y--;
        }
        map[y][x] = 0;
        if (Math.random() < 0.18) {
          const widen = randi(1, 2);
          for (let oy = -widen; oy <= widen; oy++) {
            for (let ox = -widen; ox <= widen; ox++) {
              const nx = x + ox, ny = y + oy;
              if (ny > 1 && ny < rows - 1 && nx > 1 && nx < cols - 1) map[ny][nx] = 0;
            }
          }
        }
      }
    }

    for (let i = 0; i < roomCount; i++) {
      const w = randi(6, 12);
      const h = randi(6, 12);
      const x = randi(2, cols - w - 3);
      const y = randi(2, rows - h - 3);
      let overlaps = false;
      for (const r of rooms) {
        if (x < r.x + r.w + 2 && x + w + 2 > r.x && y < r.y + r.h + 2 && y + h + 2 > r.y) {
          overlaps = true;
          break;
        }
      }
      if (!overlaps) carveRoom(x, y, w, h);
    }

    rooms.sort((a, b) => a.cx - b.cx);
    for (let i = 1; i < rooms.length; i++) {
      carveCorridor(rooms[i - 1].cx, rooms[i - 1].cy, rooms[i].cx, rooms[i].cy);
    }

    const startRoom = rooms[0];
    const bossRoom = rooms[rooms.length - 1];
    const stairs = { x: bossRoom.cx * tile + tile / 2, y: bossRoom.cy * tile + tile / 2 + tile * 1.5, radius: 14 };

    const enemies = [];
    const nests = [];
    const turrets = [];
    const items = [];

    for (let i = 1; i < rooms.length - 1; i++) {
      const r = rooms[i];
      const spawns = randi(1, 3);
      for (let j = 0; j < spawns; j++) {
        const ex = (r.x + randi(1, r.w - 2)) * tile + tile / 2;
        const ey = (r.y + randi(1, r.h - 2)) * tile + tile / 2;
        const roll = Math.random();
        const type = roll < 0.24 ? 'melee' : roll < 0.42 ? 'tank' : roll < 0.60 ? 'poison' : roll < 0.80 ? 'charger' : 'shooter';
        enemies.push(createEnemy(type, ex, ey, floor));
      }
      if (Math.random() < 0.23) {
        nests.push({
          x: r.cx * tile + tile / 2,
          y: r.cy * tile + tile / 2,
          radius: 15,
          hp: 10 + floor * 3,
          maxHp: 10 + floor * 3,
          spawnTimer: rand(3, 6),
          dead: false,
        });
      }
      if (Math.random() < 0.18) {
        turrets.push({
          x: (r.x + randi(1, r.w - 2)) * tile + tile / 2,
          y: (r.y + randi(1, r.h - 2)) * tile + tile / 2,
          radius: 13,
          hp: 8 + floor * 2,
          maxHp: 8 + floor * 2,
          mode: Math.random() < 0.5 ? 'aim' : 'fixed',
          angle: rand(0, Math.PI * 2),
          shootCd: rand(1.2, 2.2),
          dead: false,
        });
      }
      if (Math.random() < 0.35) {
        const ix = (r.x + randi(1, r.w - 2)) * tile + tile / 2;
        const iy = (r.y + randi(1, r.h - 2)) * tile + tile / 2;
        const rollItem = Math.random();
        let kind = 'potion';
        if (rollItem < 0.2) kind = 'mushroom';
        else if (rollItem < 0.45) kind = 'sword';
        else if (rollItem < 0.65) kind = 'bow';
        items.push(makeItem(kind, ix, iy));
      }
    }

    const boss = createEnemy('boss', bossRoom.cx * tile + tile / 2, bossRoom.cy * tile + tile / 2 - tile, floor, true);

    for (let i = 0; i < 80; i++) {
      const x = randi(1, cols - 2);
      const y = randi(1, rows - 2);
      if (map[y][x] === 0 && Math.random() < 0.12) map[y][x] = 2;
    }

    return {
      cols, rows, tile, map, rooms,
      startX: startRoom.cx * tile + tile / 2,
      startY: startRoom.cy * tile + tile / 2,
      stairs,
      enemies,
      nests,
      turrets,
      boss,
      items,
      palette: makeDepthPalette(floor),
    };
  }

  function makeItem(kind, x, y) {
    if (kind === 'sword') {
      const tiers = ['copper', 'iron', 'silver', 'flame', 'lizard', 'gold'];
      const tier = tiers[randi(0, Math.min(tiers.length - 1, Math.floor(state.floor / 2)))];
      return { kind, x, y, radius: 10, tier };
    }
    if (kind === 'bow') {
      const tiers = ['copper', 'silver', 'gold'];
      const tier = tiers[randi(0, Math.min(tiers.length - 1, Math.floor(state.floor / 4)))];
      return { kind, x, y, radius: 10, tier };
    }
    if (kind === 'mushroom') return { kind, x, y, radius: 8 };
    return { kind: 'potion', x, y, radius: 8 };
  }

  function loadFloor(keepPlayerStats = true) {
    const prev = state.player;
    state.map = generateDungeon(state.floor);
    state.enemies = state.map.enemies;
    state.nests = state.map.nests;
    state.turrets = state.map.turrets;
    state.items = state.map.items;
    state.projectiles = [];
    state.effects = [];
    state.boss = state.map.boss;
    state.stairs = state.map.stairs;

    if (!keepPlayerStats || !prev) {
      state.player = createPlayer();
    }
    state.player.x = state.map.startX;
    state.player.y = state.map.startY;
    state.player.vx = 0;
    state.player.vy = 0;
    state.player.hasKey = false;
    state.player.swordAnim = null;
    state.player.swordHitMap.clear();
    if (keepPlayerStats && prev) {
      const heal = Math.floor(state.player.maxHp / 4);
      state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
    }
    state.camera.x = state.player.x;
    state.camera.y = state.player.y;
    state.floorClearMessageTimer = 1.2;
  }

  function restartGame() {
    state.gameOver = false;
    state.floor = 1;
    state.damageFlash = 0;
    loadFloor(false);
  }

  function getInputAxes() {
    let x = 0, y = 0;
    if (keys.has('arrowleft') || keys.has('a')) x -= 1;
    if (keys.has('arrowright') || keys.has('d')) x += 1;
    if (keys.has('arrowup') || keys.has('w')) y -= 1;
    if (keys.has('arrowdown') || keys.has('s')) y += 1;
    return normalize(x, y);
  }

  function isWallAtPixel(x, y) {
    const t = state.map.tile;
    const tx = Math.floor(x / t);
    const ty = Math.floor(y / t);
    if (tx < 0 || ty < 0 || tx >= state.map.cols || ty >= state.map.rows) return true;
    return state.map.map[ty][tx] === 1;
  }

  function isBreakableAtPixel(x, y) {
    const t = state.map.tile;
    const tx = Math.floor(x / t);
    const ty = Math.floor(y / t);
    if (tx < 0 || ty < 0 || tx >= state.map.cols || ty >= state.map.rows) return false;
    return state.map.map[ty][tx] === 2;
  }

  function destroyBreakableAtPixel(x, y) {
    const t = state.map.tile;
    const tx = Math.floor(x / t);
    const ty = Math.floor(y / t);
    if (tx < 0 || ty < 0 || tx >= state.map.cols || ty >= state.map.rows) return false;
    if (state.map.map[ty][tx] === 2) {
      state.map.map[ty][tx] = 0;
      burst(x, y, '#c69c6d', 8);
      return true;
    }
    return false;
  }

  function moveWithCollision(obj, dt) {
    const r = obj.radius;
    let nx = obj.x + obj.vx * dt;
    let ny = obj.y;

    if (isWallAtPixel(nx - r, ny - r) || isWallAtPixel(nx + r, ny - r) || isWallAtPixel(nx - r, ny + r) || isWallAtPixel(nx + r, ny + r)) {
      obj.vx *= -0.15;
    } else {
      obj.x = nx;
    }

    nx = obj.x;
    ny = obj.y + obj.vy * dt;
    if (isWallAtPixel(nx - r, ny - r) || isWallAtPixel(nx + r, ny - r) || isWallAtPixel(nx - r, ny + r) || isWallAtPixel(nx + r, ny + r)) {
      obj.vy *= -0.15;
    } else {
      obj.y = ny;
    }
  }

  function damagePlayer(amount, sourceAngle = 0, poison = false) {
    const p = state.player;
    const front = angleDiff(p.angle, sourceAngle + Math.PI) <= Math.PI / 4;
    const dmg = Math.max(1, amount - (p.def + (front ? p.frontDefBonus : 0)));
    p.hp -= dmg;
    p.regenBlock = p.regenCooldownAfterHit;
    p.regenTimer = 0;
    state.damageFlash = 0.16;
    burst(p.x, p.y, '#fff', 10);
    if (poison) p.poisoned = Math.max(p.poisoned, rand(5, 20));
    if (p.hp <= 0) {
      p.hp = 0;
      state.gameOver = true;
    }
  }

  function damageEnemy(enemy, rawAmount, fromAngle = 0, poison = false) {
    const front = angleDiff(fromAngle, enemy.angle + Math.PI) <= Math.PI / 4;
    const dmg = Math.max(1, rawAmount - enemy.def + (front ? 1 : 0));
    enemy.hp -= dmg;
    enemy.showHpTimer = 2.2;
    burst(enemy.x, enemy.y, '#fff', 6);
    if (poison && Math.random() < 0.35) enemy.poisoned = 4;
    if (enemy.hp <= 0 && !enemy.dead) {
      enemy.dead = true;
      state.player.gold += enemy.goldValue;
      gainExp(4 + Math.floor(enemy.goldValue / 4));
      burst(enemy.x, enemy.y, enemy.color, enemy.isBoss ? 24 : 12);
      if (enemy.isBoss) {
        state.player.hasKey = true;
        state.items.push({ kind: 'keyfx', x: enemy.x, y: enemy.y, radius: 8, ttl: 1.0 });
      } else {
        const roll = Math.random();
        if (roll < 0.12) state.items.push({ kind: 'potion', x: enemy.x, y: enemy.y, radius: 8 });
        else if (roll < 0.20) state.items.push({ kind: 'mushroom', x: enemy.x, y: enemy.y, radius: 8 });
      }
    }
    return dmg;
  }

  function gainExp(v) {
    const p = state.player;
    p.exp += v;
    while (p.exp >= p.expToNext) {
      p.exp -= p.expToNext;
      p.level++;
      p.expToNext = Math.floor(p.expToNext * 1.35 + 6);
      p.maxHp += 4;
      p.atk += 1;
      p.def += 1;
      p.naturalRegen = Math.min(4, p.naturalRegen + 0.3);
      p.hp = Math.min(p.maxHp, p.hp + 6);
      burst(p.x, p.y, '#8df58d', 18);
    }
  }

  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      state.effects.push({
        x, y,
        vx: rand(-120, 120),
        vy: rand(-120, 120),
        life: rand(0.2, 0.6),
        maxLife: 0.6,
        color,
        size: rand(2, 5),
      });
    }
  }

  function useSword() {
    const p = state.player;
    if (state.gameOver || p.swordAnim) return;
    p.swordAnim = { t: 0, hitDone: false, length: 0 };
    p.swordHitMap.clear();
  }

  function useBow() {
    const p = state.player;
    if (state.gameOver) return;
    if (!p.bow || p.arrowCount <= 0) return;
    const now = performance.now() * 0.001;
    if (now - p.lastBowShot < 0.24) return;
    const dir = { x: Math.cos(p.angle), y: Math.sin(p.angle) };
    const speed = 420;
    state.projectiles.push(createProjectile(p.x + dir.x * 18, p.y + dir.y * 18, dir.x * speed, dir.y * speed, BOW_DATA[p.bow].damage + Math.floor(p.atk * 0.35), 'player', BOW_DATA[p.bow].color, false, 4));
    p.arrowCount--;
    p.lastBowShot = now;
    if (p.arrowCount <= 0) p.bow = null;
  }

  function useMushroom() {
    const p = state.player;
    if (p.antidoteMushrooms > 0 && p.poisoned > 0) {
      p.antidoteMushrooms--;
      p.poisoned = 0;
      burst(p.x, p.y, '#b5ff7a', 12);
    }
  }

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'j') useSword();
    if (k === 'k') useBow();
    if (k === 'l') useMushroom();
  });

  function updatePlayer(dt) {
    const p = state.player;
    const input = getInputAxes();
    p.vx += input.x * p.accel * dt;
    p.vy += input.y * p.accel * dt;

    if (input.x !== 0 || input.y !== 0) {
      p.angle = Math.atan2(input.y, input.x);
    }

    const spd = Math.hypot(p.vx, p.vy);
    const maxSpd = p.speed;
    if (spd > maxSpd) {
      p.vx = (p.vx / spd) * maxSpd;
      p.vy = (p.vy / spd) * maxSpd;
    }

    const drag = Math.pow(0.0001, dt);
    p.vx *= drag;
    p.vy *= drag;

    moveWithCollision(p, dt);

    if (p.regenBlock > 0) p.regenBlock -= dt;
    else {
      p.regenTimer += dt;
      if (p.regenTimer >= p.naturalRegenInterval) {
        p.regenTimer = 0;
        p.hp = Math.min(p.maxHp, p.hp + p.naturalRegen);
      }
    }

    if (p.poisoned > 0) {
      const before = Math.ceil(p.poisoned);
      p.poisoned = Math.max(0, p.poisoned - dt);
      const after = Math.ceil(p.poisoned);
      if (after < before && before > 0) {
        p.hp = Math.max(0, p.hp - 1);
        burst(p.x, p.y, '#73e36f', 4);
        if (p.hp <= 0) state.gameOver = true;
      }
    }

    if (p.swordAnim) {
      const s = p.swordAnim;
      s.t += dt / 0.22;
      const phase = s.t;
      const dirX = Math.cos(p.angle);
      const dirY = Math.sin(p.angle);
      let len = 0;
      if (phase <= 0.5) len = lerp(8, 54, phase / 0.5);
      else len = lerp(54, 10, (phase - 0.5) / 0.5);
      s.length = len;

      const tipX = p.x + dirX * len;
      const tipY = p.y + dirY * len;

      if (isWallAtPixel(tipX, tipY)) {
        s.t = Math.max(s.t, 0.5);
      }

      let hitAnything = false;
      const swordPower = p.atk + SWORD_DATA[p.sword.tier].damage + p.frontAtkBonus;
      const targets = state.boss && !state.boss.dead ? state.enemies.concat([state.boss]) : state.enemies;

      for (const enemy of targets) {
        if (!enemy || enemy.dead) continue;
        const d = dist(tipX, tipY, enemy.x, enemy.y);
        if (d < enemy.radius + 8 && !p.swordHitMap.has(enemy)) {
          p.swordHitMap.add(enemy);
          damageEnemy(enemy, swordPower, p.angle);
          hitAnything = true;
        }
      }

      for (const nest of state.nests) {
        if (nest.dead) continue;
        if (dist(tipX, tipY, nest.x, nest.y) < nest.radius + 8) {
          nest.hp -= p.atk + SWORD_DATA[p.sword.tier].damage;
          hitAnything = true;
          if (nest.hp <= 0) {
            nest.dead = true;
            burst(nest.x, nest.y, '#cc8855', 16);
            state.player.gold += 10;
            gainExp(6);
          }
        }
      }

      for (const turret of state.turrets) {
        if (turret.dead) continue;
        if (dist(tipX, tipY, turret.x, turret.y) < turret.radius + 8) {
          turret.hp -= p.atk + SWORD_DATA[p.sword.tier].damage;
          hitAnything = true;
          if (turret.hp <= 0) {
            turret.dead = true;
            burst(turret.x, turret.y, '#88bbff', 16);
            state.player.gold += 8;
            gainExp(5);
          }
        }
      }

      if (destroyBreakableAtPixel(tipX, tipY)) hitAnything = true;

      if (phase >= 1) {
        if (hitAnything && p.sword.tier !== 'wood') {
          p.sword.durability -= 1;
          if (p.sword.durability <= 0) {
            p.sword = { tier: 'wood', durability: Infinity };
            burst(p.x, p.y, '#f8d27a', 10);
          }
        }
        p.swordAnim = null;
        p.swordHitMap.clear();
      }
    }

    if (state.player.hasKey && dist(p.x, p.y, state.stairs.x, state.stairs.y) < 22) {
      state.floor++;
      loadFloor(true);
    }
  }

  function updateEnemy(enemy, dt) {
    if (enemy.dead) return;
    enemy.showHpTimer = Math.max(0, enemy.showHpTimer - dt);
    const p = state.player;
    const dx = p.x - enemy.x;
    const dy = p.y - enemy.y;
    const d = Math.hypot(dx, dy) || 1;
    const dir = { x: dx / d, y: dy / d };

    let targetX = dir.x;
    let targetY = dir.y;

    if (enemy.ai === 'wander') {
      targetX = Math.sin(performance.now() * 0.001 + enemy.x * 0.01);
      targetY = Math.cos(performance.now() * 0.0012 + enemy.y * 0.01);
    } else if (enemy.ai === 'flee' && d < 120) {
      targetX = -dir.x;
      targetY = -dir.y;
    } else if (enemy.ai === 'ambush') {
      const px = p.x + p.vx * 0.4;
      const py = p.y + p.vy * 0.4;
      const nd = normalize(px - enemy.x, py - enemy.y);
      targetX = nd.x;
      targetY = nd.y;
    }

    if (enemy.ranged && d < 180) {
      targetX *= -0.3;
      targetY *= -0.3;
    }

    enemy.vx += targetX * enemy.accel * dt;
    enemy.vy += targetY * enemy.accel * dt;
    const spd = Math.hypot(enemy.vx, enemy.vy);
    if (spd > enemy.speed) {
      enemy.vx = enemy.vx / spd * enemy.speed;
      enemy.vy = enemy.vy / spd * enemy.speed;
    }
    enemy.vx *= Math.pow(0.01, dt);
    enemy.vy *= Math.pow(0.01, dt);
    moveWithCollision(enemy, dt);

    if (Math.hypot(enemy.vx, enemy.vy) > 1) enemy.angle = Math.atan2(enemy.vy, enemy.vx);

    if (d < enemy.radius + p.radius + 3) {
      enemy.touchTick -= dt;
      if (enemy.touchTick <= 0) {
        damagePlayer(enemy.atk, Math.atan2(enemy.y - p.y, enemy.x - p.x), enemy.poison);
        const front = angleDiff(p.angle, Math.atan2(enemy.y - p.y, enemy.x - p.x)) <= Math.PI / 4;
        const ret = Math.max(1, (p.atk + (front ? p.frontAtkBonus : 0)) - enemy.def);
        damageEnemy(enemy, ret, p.angle);
        enemy.touchTick = 0.2;
      }
      const push = normalize(enemy.x - p.x, enemy.y - p.y);
      enemy.x += push.x * 8 * dt * (p.weight / Math.max(1, enemy.weight));
      enemy.y += push.y * 8 * dt * (p.weight / Math.max(1, enemy.weight));
    }

    if (enemy.ranged) {
      enemy.shootCd -= dt;
      if (enemy.shootCd <= 0 && d < 280) {
        const shotDir = normalize(p.x - enemy.x, p.y - enemy.y);
        state.projectiles.push(createProjectile(enemy.x, enemy.y, shotDir.x * 220, shotDir.y * 220, enemy.atk, 'enemy', enemy.color, enemy.poison, 5));
        enemy.shootCd = rand(1.3, 2.5);
      }
    }
  }

  function separateEnemies(dt) {
    const all = state.enemies.filter(e => !e.dead).concat(state.boss && !state.boss.dead ? [state.boss] : []);
    for (let i = 0; i < all.length; i++) {
      for (let j = i + 1; j < all.length; j++) {
        const a = all[i], b = all[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d = Math.hypot(dx, dy) || 0.001;
        const min = a.radius + b.radius + 2;
        if (d < min) {
          const overlap = min - d;
          const nx = dx / d, ny = dy / d;
          const aw = 1 / Math.max(1, a.weight);
          const bw = 1 / Math.max(1, b.weight);
          const total = aw + bw;
          a.x -= nx * overlap * (aw / total) * 0.5;
          a.y -= ny * overlap * (aw / total) * 0.5;
          b.x += nx * overlap * (bw / total) * 0.5;
          b.y += ny * overlap * (bw / total) * 0.5;
        }
      }
    }
  }

  function updateNests(dt) {
    for (const nest of state.nests) {
      if (nest.dead) continue;
      nest.spawnTimer -= dt;
      if (nest.spawnTimer <= 0) {
        nest.spawnTimer = rand(4.0, 7.0);
        const types = ['melee', 'poison', 'charger'];
        const type = types[randi(0, types.length - 1)];
        state.enemies.push(createEnemy(type, nest.x + rand(-20, 20), nest.y + rand(-20, 20), state.floor));
      }
    }
  }

  function updateTurrets(dt) {
    for (const turret of state.turrets) {
      if (turret.dead) continue;
      turret.shootCd -= dt;
      if (turret.mode === 'fixed') turret.angle += dt * 0.8;
      if (turret.shootCd <= 0) {
        let dir;
        if (turret.mode === 'aim') dir = normalize(state.player.x - turret.x, state.player.y - turret.y);
        else dir = { x: Math.cos(turret.angle), y: Math.sin(turret.angle) };
        state.projectiles.push(createProjectile(turret.x, turret.y, dir.x * 240, dir.y * 240, 4 + Math.floor(state.floor * 0.5), 'enemy', '#9ad0ff', false, 5));
        turret.shootCd = rand(1.2, 2.1);
      }
    }
  }

  function updateProjectiles(dt) {
    for (const pr of state.projectiles) {
      if (pr.dead) continue;
      pr.x += pr.vx * dt;
      pr.y += pr.vy * dt;
      pr.life -= dt;
      if (pr.life <= 0) pr.dead = true;
      if (isWallAtPixel(pr.x, pr.y)) pr.dead = true;
      if (isBreakableAtPixel(pr.x, pr.y) && pr.owner === 'player') {
        destroyBreakableAtPixel(pr.x, pr.y);
        pr.dead = true;
      }
      if (pr.owner === 'player') {
        for (const enemy of state.enemies.concat(state.boss ? [state.boss] : [])) {
          if (!enemy || enemy.dead) continue;
          if (dist(pr.x, pr.y, enemy.x, enemy.y) < pr.radius + enemy.radius) {
            damageEnemy(enemy, pr.damage, Math.atan2(pr.vy, pr.vx));
            pr.dead = true;
            break;
          }
        }
        for (const nest of state.nests) {
          if (nest.dead) continue;
          if (dist(pr.x, pr.y, nest.x, nest.y) < pr.radius + nest.radius) {
            nest.hp -= pr.damage;
            if (nest.hp <= 0) {
              nest.dead = true;
              burst(nest.x, nest.y, '#cc8855', 16);
              state.player.gold += 10;
              gainExp(6);
            }
            pr.dead = true;
            break;
          }
        }
        for (const turret of state.turrets) {
          if (turret.dead) continue;
          if (dist(pr.x, pr.y, turret.x, turret.y) < pr.radius + turret.radius) {
            turret.hp -= pr.damage;
            if (turret.hp <= 0) {
              turret.dead = true;
              burst(turret.x, turret.y, '#88bbff', 16);
              state.player.gold += 8;
              gainExp(5);
            }
            pr.dead = true;
            break;
          }
        }
      } else {
        const p = state.player;
        if (dist(pr.x, pr.y, p.x, p.y) < pr.radius + p.radius) {
          damagePlayer(pr.damage, Math.atan2(pr.vy, pr.vx), pr.poison);
          pr.dead = true;
        }
      }
    }
    state.projectiles = state.projectiles.filter(p => !p.dead);
  }

  function updateItems(dt) {
    for (const item of state.items) {
      if (item.kind === 'keyfx') {
        item.ttl -= dt;
      }
    }
    state.items = state.items.filter(item => item.kind !== 'keyfx' || item.ttl > 0);

    const p = state.player;
    for (let i = state.items.length - 1; i >= 0; i--) {
      const item = state.items[i];
      if (dist(item.x, item.y, p.x, p.y) < item.radius + p.radius + 2) {
        if (item.kind === 'potion') {
          p.hp = Math.min(p.maxHp, p.hp + 8);
          burst(item.x, item.y, '#ff7070', 10);
        } else if (item.kind === 'mushroom') {
          p.antidoteMushrooms++;
          burst(item.x, item.y, '#b7ff72', 10);
        } else if (item.kind === 'sword') {
          const data = SWORD_DATA[item.tier];
          p.sword = { tier: item.tier, durability: data.durability };
          burst(item.x, item.y, data.color, 12);
        } else if (item.kind === 'bow') {
          const data = BOW_DATA[item.tier];
          p.bow = item.tier;
          p.arrowCount = data.arrows;
          burst(item.x, item.y, data.color, 12);
        }
        state.items.splice(i, 1);
      }
    }
  }

  function updateEffects(dt) {
    for (const e of state.effects) {
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.life -= dt;
    }
    state.effects = state.effects.filter(e => e.life > 0);
  }

  function update(dt) {
    if (state.floorClearMessageTimer > 0) state.floorClearMessageTimer -= dt;
    state.damageFlash = Math.max(0, state.damageFlash - dt);
    if (state.gameOver) return;

    updatePlayer(dt);
    for (const enemy of state.enemies) updateEnemy(enemy, dt);
    if (state.boss) updateEnemy(state.boss, dt);
    separateEnemies(dt);
    updateNests(dt);
    updateTurrets(dt);
    updateProjectiles(dt);
    updateItems(dt);
    updateEffects(dt);

    state.enemies = state.enemies.filter(e => !e.dead);
    if (state.boss && state.boss.dead) state.boss = null;

    state.camera.x += (state.player.x - state.camera.x) * Math.min(1, dt * 7);
    state.camera.y += (state.player.y - state.camera.y) * Math.min(1, dt * 7);
  }

  function worldToScreen(x, y) {
    return {
      x: Math.round(x - state.camera.x + canvas.width / 2),
      y: Math.round(y - state.camera.y + canvas.height / 2),
    };
  }

  function drawShape(x, y, r, shape, angle, color, stroke = null, alpha = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    if (stroke) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
    }
    ctx.beginPath();
    if (shape === 'circle') {
      ctx.arc(0, 0, r, 0, Math.PI * 2);
    } else if (shape === 'square') {
      ctx.rect(-r, -r, r * 2, r * 2);
    } else if (shape === 'triangle') {
      ctx.moveTo(r, 0);
      ctx.lineTo(-r, -r * 0.85);
      ctx.lineTo(-r, r * 0.85);
      ctx.closePath();
    } else if (shape === 'diamond') {
      ctx.moveTo(r, 0);
      ctx.lineTo(0, -r);
      ctx.lineTo(-r, 0);
      ctx.lineTo(0, r);
      ctx.closePath();
    }
    ctx.fill();
    if (stroke) ctx.stroke();
    ctx.restore();
  }

  function drawMap() {
    const { tile, cols, rows, map, palette } = state.map;
    const startX = Math.floor((state.camera.x - canvas.width / 2) / tile) - 1;
    const startY = Math.floor((state.camera.y - canvas.height / 2) / tile) - 1;
    const endX = startX + Math.ceil(canvas.width / tile) + 3;
    const endY = startY + Math.ceil(canvas.height / tile) + 3;

    for (let y = startY; y < endY; y++) {
      for (let x = startX; x < endX; x++) {
        if (x < 0 || y < 0 || x >= cols || y >= rows) continue;
        const s = worldToScreen(x * tile, y * tile);
        const cell = map[y][x];
        if (cell === 1) ctx.fillStyle = palette.wall;
        else if (cell === 2) ctx.fillStyle = palette.accent;
        else ctx.fillStyle = palette.floor;
        ctx.fillRect(s.x, s.y, tile + 1, tile + 1);
        if (cell === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.03)';
          ctx.fillRect(s.x + 2, s.y + 2, tile - 4, tile - 4);
        }
      }
    }
  }

  function drawHpBar(x, y, w, h, ratio) {
    ctx.fillStyle = '#a33';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#39d353';
    ctx.fillRect(x, y, w * clamp(ratio, 0, 1), h);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.strokeRect(x, y, w, h);
  }

  function drawWorld() {
    drawMap();

    const stairs = worldToScreen(state.stairs.x, state.stairs.y);
    ctx.save();
    ctx.strokeStyle = state.player.hasKey ? '#fff2a6' : '#d1d1d1';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(stairs.x, stairs.y, 15, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(stairs.x - 8, stairs.y - 3);
    ctx.lineTo(stairs.x, stairs.y + 7);
    ctx.lineTo(stairs.x + 8, stairs.y - 3);
    ctx.stroke();
    ctx.restore();

    for (const item of state.items) {
      const s = worldToScreen(item.x, item.y);
      if (item.kind === 'potion') drawShape(s.x, s.y, 8, 'circle', 0, '#ff7070');
      else if (item.kind === 'mushroom') drawShape(s.x, s.y, 8, 'triangle', 0, '#b7ff72');
      else if (item.kind === 'sword') drawShape(s.x, s.y, 9, 'square', Math.PI / 4, SWORD_DATA[item.tier].color);
      else if (item.kind === 'bow') drawShape(s.x, s.y, 9, 'diamond', 0, BOW_DATA[item.tier].color);
      else if (item.kind === 'keyfx') drawShape(s.x, s.y, 8, 'diamond', performance.now() * 0.004, '#ffe56f');
    }

    for (const nest of state.nests) {
      if (nest.dead) continue;
      const s = worldToScreen(nest.x, nest.y);
      drawShape(s.x, s.y, nest.radius, 'diamond', performance.now() * 0.001, '#bb7744', '#f6d09c');
      drawHpBar(s.x - 18, s.y - nest.radius - 12, 36, 5, nest.hp / nest.maxHp);
    }

    for (const turret of state.turrets) {
      if (turret.dead) continue;
      const s = worldToScreen(turret.x, turret.y);
      drawShape(s.x, s.y, turret.radius, 'square', turret.angle, '#7fb8ff', '#dfefff');
      drawHpBar(s.x - 18, s.y - turret.radius - 12, 36, 5, turret.hp / turret.maxHp);
    }

    for (const enemy of state.enemies) {
      if (enemy.dead) continue;
      const s = worldToScreen(enemy.x, enemy.y);
      const stroke = enemy.poison ? '#d9ffcf' : null;
      drawShape(s.x, s.y, enemy.radius, enemy.shape, enemy.angle, enemy.color, stroke);
      if (enemy.showHpTimer > 0) drawHpBar(s.x - 18, s.y - enemy.radius - 12, 36, 5, enemy.hp / enemy.maxHp);
    }

    if (state.boss && !state.boss.dead) {
      const b = state.boss;
      const s = worldToScreen(b.x, b.y);
      drawShape(s.x, s.y, b.radius, b.shape, b.angle, b.color, '#fff');
      drawHpBar(s.x - 40, s.y - b.radius - 16, 80, 7, b.hp / b.maxHp);
    }

    for (const pr of state.projectiles) {
      const s = worldToScreen(pr.x, pr.y);
      ctx.fillStyle = pr.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, pr.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    const p = state.player;
    const ps = worldToScreen(p.x, p.y);
    drawShape(ps.x, ps.y, p.radius, p.shape, p.angle, state.damageFlash > 0 ? '#ffffff' : '#ffd54f', '#222');

    const fx = ps.x + Math.cos(p.angle) * (p.radius + 5);
    const fy = ps.y + Math.sin(p.angle) * (p.radius + 5);
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(fx, fy, 3, 0, Math.PI * 2);
    ctx.fill();

    if (p.swordAnim) {
      const len = p.swordAnim.length;
      ctx.save();
      ctx.strokeStyle = SWORD_DATA[p.sword.tier].color;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ps.x, ps.y);
      ctx.lineTo(ps.x + Math.cos(p.angle) * len, ps.y + Math.sin(p.angle) * len);
      ctx.stroke();
      ctx.restore();
    }

    for (const e of state.effects) {
      const s = worldToScreen(e.x, e.y);
      ctx.globalAlpha = clamp(e.life / e.maxLife, 0, 1);
      ctx.fillStyle = e.color;
      ctx.fillRect(s.x, s.y, e.size, e.size);
      ctx.globalAlpha = 1;
    }
  }

  function drawUI() {
    const p = state.player;
    const pad = 14;
    const line = 22;
    const boxW = 320;
    const boxH = 250;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(pad, pad, boxW, boxH);
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.strokeRect(pad, pad, boxW, boxH);

    ctx.fillStyle = '#fff';
    ctx.font = '16px system-ui, sans-serif';
    const swordName = SWORD_DATA[p.sword.tier].name;
    const bowName = p.bow ? BOW_DATA[p.bow].name : 'なし';
    const swordDur = Number.isFinite(p.sword.durability) ? p.sword.durability : '∞';

    const rows = [
      `現在階層: ${state.floor}`,
      `HP: ${Math.ceil(p.hp)} / ${p.maxHp}`,
      `レベル: ${p.level}`,
      `経験値: ${p.exp} / ${p.expToNext}`,
      `所持 gold: ${p.gold}`,
      `鍵: ${p.hasKey ? 'あり' : 'なし'}`,
      `毒状態: ${p.poisoned > 0 ? `あり (${Math.ceil(p.poisoned)}秒)` : 'なし'}`,
      `毒消しキノコ: ${p.antidoteMushrooms}`,
      `現在武器: ${swordName}`,
      `剣耐久: ${swordDur}`,
      `弓: ${bowName}`,
      `矢本数: ${p.arrowCount}`,
    ];

    drawHpBar(pad + 12, pad + 12, 190, 14, p.hp / p.maxHp);
    for (let i = 0; i < rows.length; i++) {
      ctx.fillStyle = '#f1f1f1';
      ctx.fillText(rows[i], pad + 12, pad + 46 + i * line);
    }

    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.fillText(`v${VERSION}`, canvas.width - 16, 24);
    ctx.textAlign = 'left';

    if (state.floorClearMessageTimer > 0) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 28px system-ui, sans-serif';
      ctx.fillText(`Floor ${state.floor}`, canvas.width / 2, 48);
      ctx.restore();
    }

    if (!state.player.hasKey && state.boss && !state.boss.dead) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,232,180,0.95)';
      ctx.font = '16px system-ui, sans-serif';
      ctx.fillText('フロアマスターを倒して鍵を入手せよ', canvas.width / 2, canvas.height - 24);
      ctx.restore();
    }

    if (state.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 46px system-ui, sans-serif';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '20px system-ui, sans-serif';
      ctx.fillText('Rキーで最初から再開', canvas.width / 2, canvas.height / 2 + 34);
      ctx.textAlign = 'left';
    }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawWorld();
    drawUI();
  }

  function loop(ts) {
    const dt = Math.min(0.033, (ts - state.lastTime) / 1000 || 0.016);
    state.lastTime = ts;
    try {
      update(dt);
      render();
    } catch (err) {
      console.error(err);
      state.gameOver = true;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '20px system-ui, sans-serif';
      ctx.fillText('Error: ' + (err && err.message ? err.message : err), 24, 40);
      return;
    }
    requestAnimationFrame(loop);
  }

  restartGame();
  requestAnimationFrame(loop);
})();
